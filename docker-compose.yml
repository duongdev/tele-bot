services:
  app:
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - redis
      - cobalt
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - STRING_SESSION=${STRING_SESSION}
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - PROXY=${PROXY:-}
      - COBALT_API_URL=http://cobalt:9000
      - COBALT_API_KEY=${COBALT_API_KEY:-}
      - SUPPORTED_SERVICES=${SUPPORTED_SERVICES:-}
    volumes:
      - downloads:/app/downloads

  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app-network
    environment:
      - API_URL=http://cobalt:9000
      - YOUTUBE_SESSION_SERVER=http://yt-session-generator:8080/token
      - YOUTUBE_SESSION_INNERTUBE_CLIENT=WEB_EMBEDDED
    depends_on:
      - yt-session-generator

  yt-session-generator:
    image: ghcr.io/imputnet/yt-session-generator:webserver
    restart: unless-stopped
    init: true
    networks:
      - app-network

  redis:
    image: redis:latest
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - redis-data:/data

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  downloads:
    driver: local
